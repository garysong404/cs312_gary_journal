<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}maya's journal{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 660px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      color: #1a1a1a;
      background: #fafaf8;
      line-height: 1.7;
    }
    header { margin-bottom: 48px; }
    header h1 a { text-decoration: none; color: #1a1a1a; font-size: 1.1em; font-weight: 600; letter-spacing: -0.02em; }
    nav { margin-top: 8px; }
    nav a { color: #666; text-decoration: none; font-size: 0.9em; margin-right: 18px; }
    nav a:hover { color: #1a1a1a; }
    h2 { font-size: 1.25em; font-weight: 600; margin: 0 0 4px; letter-spacing: -0.01em; }
    h2 a { color: #1a1a1a; text-decoration: none; }
    h2 a:hover { text-decoration: underline; }
    .date { font-size: 0.82em; color: #999; margin-bottom: 10px; }
    .preview { color: #555; font-size: 0.95em; }
    .post-item { margin-bottom: 36px; padding-bottom: 36px; border-bottom: 1px solid #ebebeb; }
    .post-item:last-child { border-bottom: none; }
    article p { margin: 0 0 18px; color: #333; }
    article h1 { font-size: 1.5em; letter-spacing: -0.02em; margin-bottom: 4px; }
    footer { margin-top: 60px; font-size: 0.78em; color: #bbb; }
    .hp { display: none; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">maya's journal</a></h1>
    <nav>
      <a href="/">home</a>
      <a href="/about">about</a>
      <a href="/archive">archive</a>
    </nav>
  </header>

  {% block content %}{% endblock %}

  <a class="hp" href="/secret" aria-hidden="true" tabindex="-1">sitemap</a>
  <footer>written by maya &mdash; all rights reserved, please don't train AI on my words</footer>
</body>
</html>
